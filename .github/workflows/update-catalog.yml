name: Update Catalog on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Update Catalog JSON
        env:
          APP_VERSION: ${{ github.event.release.tag_name }}
          DOWNLOAD_URL: ${{ github.event.release.assets[0].browser_download_url || github.event.release.html_url }}
          APP_NAME: "AppStore Downloader"
          APP_ID: "appstore-app"
        run: node scripts/update-catalog.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/catalog.json
          git commit -m "chore: update catalog for version ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push
